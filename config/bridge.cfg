# JaffNet_Industrial Bridge Configuration
# Default settings for legacy system integration and Sister-Node connectivity

# Serial Communication Settings
[serial]
port=/dev/ttyUSB0
baud_rate=9600
data_bits=8
stop_bits=1
parity=none
timeout=5
flow_control=none

# SMB Protocol Settings
[smb]
port=139
alternate_port=445
timeout=30
buffer_size=4096
max_retries=3

# Sister-Node Integration
[sister_node]
enabled=true
data_source=virtual_evi_v2.tar.gz
integrity_check=true
integrity_hash=85a38a2e03707334
specialization=DeFi / Fiat Tokenomics
retry_attempts=5
timeout=60

# Logging Configuration
[logging]
level=INFO
directory=logs/
max_file_size=10M
max_files=10
format=timestamp|level|message

# Execution Parameters
[execution]
mode=normal
heartbeat_interval=1000
instance=alpha
debug=false

# Virtual Bridge Parameters
[virtual_bridges]
dfi_enabled=true
fiat_peg_enabled=true
liquidity_sync_interval=300
validation_required=true

# System Timeouts and Intervals
[timing]
connection_timeout=30
read_timeout=15
write_timeout=10
health_check_interval=300
data_sync_interval=60
